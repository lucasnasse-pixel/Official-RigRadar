<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RigRadar — Buy Smarter. Play Better.</title>
<meta name="description" content="Honest gaming-gear rankings built from expert reviews and thousands of verified buyers, cross-referenced into one clear signal. Top 10 mice, keyboards and more.">
<meta name="theme-color" content="#0a0711">
<meta property="og:title" content="RigRadar — Buy Smarter. Play Better.">
<meta property="og:description" content="Honest gaming-gear rankings, cross-referenced from experts and real buyers. No hype.">
<meta property="og:type" content="website">
<style>*{margin:0}html,body{background:#0a0711}</style>
</head>
<body>
<style>
  /* ============================================================
     RigRadar — Radar Console
     Single-file review platform. Tokens → components → layout.
     ============================================================ */

  :root{
    /* dark = default (a radar console is intrinsically dark) */
    --bg:#0a0711; --bg-2:#0f0b1c;
    --surface:#15102a; --surface-2:#1c1638; --surface-3:#241b45;
    --line:rgba(168,120,247,.14); --line-strong:rgba(168,120,247,.30);
    --text:#ece8fb; --muted:#a79cc9; --faint:#6f6690;
    --violet:#a855f7; --violet-br:#c084fc; --violet-deep:#7c3aed;
    --phosphor:#35f0a5; --phosphor-soft:rgba(53,240,165,.16);
    --amber:#f5b544;
    --track:rgba(168,120,247,.18);
    --shadow:0 24px 60px -24px rgba(0,0,0,.7);
    --glow:0 0 0 1px var(--line-strong), 0 18px 50px -20px rgba(124,58,237,.55);
    --radius:16px; --radius-sm:11px;
    --maxw:1200px;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,"Cascadia Code",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,Roboto,Helvetica,Arial,sans-serif;
    --scan:.045;
    color-scheme:dark;
  }
  @media (prefers-color-scheme: light){
    :root{
      --bg:#f3f1fb; --bg-2:#eae7f6;
      --surface:#ffffff; --surface-2:#f5f2fd; --surface-3:#ece7fb;
      --line:rgba(124,58,237,.16); --line-strong:rgba(124,58,237,.30);
      --text:#1b1435; --muted:#5c5382; --faint:#8b83a8;
      --violet:#7c3aed; --violet-br:#9333ea; --violet-deep:#6d28d9;
      --phosphor:#0e9d63; --phosphor-soft:rgba(14,157,99,.13);
      --amber:#b57614;
      --track:rgba(124,58,237,.16);
      --shadow:0 24px 60px -30px rgba(80,40,160,.30);
      --glow:0 0 0 1px var(--line-strong), 0 16px 40px -22px rgba(124,58,237,.35);
      --scan:.02;
      color-scheme:light;
    }
  }
  /* explicit toggle wins in both directions */
  :root[data-theme="dark"]{
    --bg:#0a0711; --bg-2:#0f0b1c; --surface:#15102a; --surface-2:#1c1638; --surface-3:#241b45;
    --line:rgba(168,120,247,.14); --line-strong:rgba(168,120,247,.30);
    --text:#ece8fb; --muted:#a79cc9; --faint:#6f6690;
    --violet:#a855f7; --violet-br:#c084fc; --violet-deep:#7c3aed;
    --phosphor:#35f0a5; --phosphor-soft:rgba(53,240,165,.16); --amber:#f5b544;
    --track:rgba(168,120,247,.18); --shadow:0 24px 60px -24px rgba(0,0,0,.7);
    --glow:0 0 0 1px var(--line-strong), 0 18px 50px -20px rgba(124,58,237,.55); --scan:.045; color-scheme:dark;
  }
  :root[data-theme="light"]{
    --bg:#f3f1fb; --bg-2:#eae7f6; --surface:#ffffff; --surface-2:#f5f2fd; --surface-3:#ece7fb;
    --line:rgba(124,58,237,.16); --line-strong:rgba(124,58,237,.30);
    --text:#1b1435; --muted:#5c5382; --faint:#8b83a8;
    --violet:#7c3aed; --violet-br:#9333ea; --violet-deep:#6d28d9;
    --phosphor:#0e9d63; --phosphor-soft:rgba(14,157,99,.13); --amber:#b57614;
    --track:rgba(124,58,237,.16); --shadow:0 24px 60px -30px rgba(80,40,160,.30);
    --glow:0 0 0 1px var(--line-strong), 0 16px 40px -22px rgba(124,58,237,.35); --scan:.02; color-scheme:light;
  }

  @property --v{ syntax:'<number>'; inherits:false; initial-value:0; }

  *{ box-sizing:border-box; }
  html{ -webkit-text-size-adjust:100%; scroll-behavior:smooth; }
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:var(--sans); font-size:16px; line-height:1.6;
    -webkit-font-smoothing:antialiased; overflow-x:hidden;
  }
  /* ambient field + scanlines */
  body::before{
    content:""; position:fixed; inset:0; z-index:0; pointer-events:none;
    background:
      radial-gradient(900px 600px at 82% -8%, rgba(124,58,237,.20), transparent 60%),
      radial-gradient(700px 520px at 6% 4%, rgba(53,240,165,.07), transparent 55%),
      radial-gradient(1000px 800px at 50% 120%, rgba(124,58,237,.10), transparent 60%);
  }
  body::after{
    content:""; position:fixed; inset:0; z-index:0; pointer-events:none;
    background:repeating-linear-gradient(to bottom, rgba(255,255,255,var(--scan)) 0 1px, transparent 1px 3px);
    mix-blend-mode:overlay; opacity:.6;
  }
  #app{ position:relative; z-index:1; }

  a{ color:inherit; text-decoration:none; }
  img{ max-width:100%; display:block; }
  button{ font-family:inherit; }
  ::selection{ background:var(--violet); color:#fff; }
  :focus-visible{ outline:2px solid var(--phosphor); outline-offset:3px; border-radius:6px; }

  .wrap{ width:100%; max-width:var(--maxw); margin:0 auto; padding:0 24px; }
  .eyebrow{
    font-family:var(--mono); font-size:12px; letter-spacing:.22em; text-transform:uppercase;
    color:var(--violet-br); display:inline-flex; align-items:center; gap:9px;
  }
  .eyebrow::before{ content:""; width:22px; height:1px; background:var(--violet); opacity:.7; }
  .eyebrow.plain::before{ display:none; }
  h1,h2,h3{ text-wrap:balance; margin:0; line-height:1.05; letter-spacing:-.02em; font-weight:800; }
  .mono{ font-family:var(--mono); }
  .tnum{ font-variant-numeric:tabular-nums; }

  /* ---------- header ---------- */
  header.nav{
    position:sticky; top:0; z-index:50;
    backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    background:color-mix(in srgb, var(--bg) 78%, transparent);
    border-bottom:1px solid var(--line);
  }
  .nav-in{ display:flex; align-items:center; gap:20px; height:66px; }
  .brand{ display:flex; align-items:center; gap:11px; margin-right:auto; }
  .brand .mark{ width:34px; height:34px; flex:0 0 auto; filter:drop-shadow(0 0 10px rgba(53,240,165,.35)); }
  .brand .wordmark{ font-weight:800; font-size:19px; letter-spacing:-.01em; }
  .brand .wordmark b{ color:var(--violet-br); font-weight:800; }
  .brand small{ display:block; font-family:var(--mono); font-size:9.5px; letter-spacing:.24em; color:var(--faint); text-transform:uppercase; margin-top:-2px; }
  nav.links{ display:flex; align-items:center; gap:4px; }
  nav.links a{
    font-size:14.5px; font-weight:600; color:var(--muted); padding:9px 14px; border-radius:999px;
    transition:color .18s, background .18s;
  }
  nav.links a:hover{ color:var(--text); background:var(--surface-2); }
  nav.links a.active{ color:var(--text); background:var(--surface-2); box-shadow:inset 0 0 0 1px var(--line-strong); }
  .nav-tools{ display:flex; align-items:center; gap:8px; }
  .icon-btn{
    display:inline-grid; place-items:center; width:40px; height:40px; border-radius:11px; cursor:pointer;
    background:var(--surface-2); border:1px solid var(--line); color:var(--muted);
    transition:color .18s, border-color .18s, transform .12s;
  }
  .icon-btn:hover{ color:var(--text); border-color:var(--line-strong); }
  .icon-btn:active{ transform:scale(.94); }
  .cmp-btn{
    position:relative; display:inline-flex; align-items:center; gap:8px; height:40px; padding:0 15px;
    border-radius:11px; background:var(--surface-2); border:1px solid var(--line); color:var(--muted);
    font-family:var(--mono); font-size:12.5px; letter-spacing:.04em; cursor:pointer; font-weight:600;
    transition:color .18s, border-color .18s;
  }
  .cmp-btn:hover{ color:var(--text); border-color:var(--line-strong); }
  .cmp-btn .n{
    min-width:20px; height:20px; padding:0 5px; border-radius:999px; display:grid; place-items:center;
    background:var(--phosphor); color:#04140c; font-weight:700; font-size:11.5px;
  }
  :root[data-theme="dark"] .cmp-btn .n, .cmp-btn .n{ color:#04140c; }
  .hamb{ display:none; }

  /* ---------- buttons ---------- */
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:9px;
    padding:13px 22px; border-radius:12px; font-weight:700; font-size:15px; cursor:pointer;
    border:1px solid transparent; transition:transform .12s, box-shadow .2s, background .2s, border-color .2s; white-space:nowrap;
  }
  .btn:active{ transform:translateY(1px); }
  .btn-primary{ background:linear-gradient(180deg, var(--violet-br), var(--violet-deep)); color:#fff; box-shadow:0 10px 30px -10px rgba(124,58,237,.75); }
  .btn-primary:hover{ box-shadow:0 14px 38px -10px rgba(124,58,237,.9); }
  .btn-ghost{ background:var(--surface-2); color:var(--text); border-color:var(--line-strong); }
  .btn-ghost:hover{ border-color:var(--violet); }
  .btn-block{ width:100%; }
  .btn-sm{ padding:9px 15px; font-size:13.5px; border-radius:10px; }

  /* ---------- gauge ---------- */
  .gauge{
    --v:0; position:relative; border-radius:50%; flex:0 0 auto; display:grid; place-items:center;
    background:conic-gradient(var(--gc,var(--phosphor)) calc(var(--v)*3.6deg), var(--track) 0deg);
    transition:--v 1.1s cubic-bezier(.2,.7,.2,1);
  }
  .gauge::before{ content:""; position:absolute; inset:4px; border-radius:50%; background:var(--surface); }
  :root[data-theme="light"] .gauge::before{ background:#fff; }
  .gauge .g-num{ position:relative; z-index:1; font-family:var(--mono); font-weight:700; letter-spacing:-.02em; }
  .gauge.sm{ width:52px; height:52px; } .gauge.sm .g-num{ font-size:15px; }
  .gauge.lg{ width:132px; height:132px; } .gauge.lg::before{ inset:8px; }
  .gauge.lg .g-num{ font-size:38px; }
  .gauge.lg .g-sub{ position:relative; z-index:1; font-family:var(--mono); font-size:9.5px; letter-spacing:.16em; color:var(--faint); text-transform:uppercase; margin-top:1px; }

  /* ---------- tag / pill ---------- */
  .tag{ font-family:var(--mono); font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:var(--violet-br);
        background:var(--surface-3); border:1px solid var(--line); padding:4px 9px; border-radius:7px; white-space:nowrap; }
  .pill{ font-family:var(--mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; padding:5px 11px; border-radius:999px; font-weight:600; }
  .pill.live{ color:var(--phosphor); background:var(--phosphor-soft); border:1px solid color-mix(in srgb,var(--phosphor) 40%, transparent); }
  .pill.soon{ color:var(--amber); background:color-mix(in srgb,var(--amber) 13%, transparent); border:1px solid color-mix(in srgb,var(--amber) 35%, transparent); }
  .price{ font-family:var(--mono); font-weight:700; color:var(--phosphor); letter-spacing:-.01em; }

  /* ---------- reveal ---------- */
  .rv{ opacity:0; transform:translateY(18px); transition:opacity .7s ease, transform .7s cubic-bezier(.2,.7,.2,1); }
  .rv.in{ opacity:1; transform:none; }

  /* ============ HERO ============ */
  .hero{ position:relative; padding:64px 0 40px; }
  .hero-grid{ display:grid; grid-template-columns:1.05fr .95fr; gap:44px; align-items:center; }
  .hero h1{ font-size:clamp(44px,6.4vw,82px); margin:18px 0 0; }
  .hero h1 .lo{ display:block; color:var(--text); }
  .hero h1 .hi{ display:block; background:linear-gradient(100deg,var(--violet-br),var(--phosphor)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .hero p.lead{ font-size:clamp(16px,1.7vw,19px); color:var(--muted); max-width:46ch; margin:22px 0 0; }
  .hero-cta{ display:flex; gap:12px; margin-top:30px; flex-wrap:wrap; }
  .hero-strip{ display:flex; gap:26px; margin-top:34px; padding-top:24px; border-top:1px solid var(--line); flex-wrap:wrap; }
  .hero-strip .s .k{ font-family:var(--mono); font-size:22px; font-weight:700; color:var(--text); letter-spacing:-.02em; }
  .hero-strip .s .k b{ color:var(--phosphor); font-weight:700; }
  .hero-strip .s .l{ font-family:var(--mono); font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--faint); margin-top:2px; }

  .radar-shell{ position:relative; aspect-ratio:1/1; border-radius:24px; overflow:hidden;
    background:radial-gradient(circle at 50% 50%, rgba(53,240,165,.06), transparent 62%), var(--surface); border:1px solid var(--line); box-shadow:var(--shadow); }
  .radar-shell canvas{ position:absolute; inset:0; width:100%; height:100%; }
  .radar-badge{ position:absolute; left:16px; top:14px; z-index:2; font-family:var(--mono); font-size:10.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--phosphor); display:flex; align-items:center; gap:7px; }
  .radar-badge .dot{ width:7px; height:7px; border-radius:50%; background:var(--phosphor); box-shadow:0 0 10px var(--phosphor); animation:blink 1.8s infinite; }
  @keyframes blink{ 0%,100%{opacity:1} 50%{opacity:.25} }
  .radar-readout{ position:absolute; right:14px; bottom:13px; z-index:2; font-family:var(--mono); font-size:10px; letter-spacing:.1em; color:var(--faint); text-align:right; text-transform:uppercase; }

  /* ============ generic section ============ */
  section.band{ padding:56px 0; position:relative; }
  .sec-head{ display:flex; align-items:flex-end; justify-content:space-between; gap:20px; margin-bottom:30px; flex-wrap:wrap; }
  .sec-head h2{ font-size:clamp(27px,3.4vw,40px); margin-top:12px; }
  .sec-head p{ color:var(--muted); margin:8px 0 0; max-width:52ch; }
  .link-arrow{ font-family:var(--mono); font-size:13px; font-weight:600; color:var(--violet-br); letter-spacing:.03em; display:inline-flex; align-items:center; gap:7px; }
  .link-arrow:hover{ color:var(--phosphor); }

  /* pillars */
  .pillars{ display:grid; grid-template-columns:repeat(3,1fr); gap:18px; }
  .pillar{ background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:26px 24px; position:relative; overflow:hidden; transition:border-color .25s, transform .25s; }
  .pillar:hover{ border-color:var(--line-strong); transform:translateY(-3px); }
  .pillar .pn{ font-family:var(--mono); font-size:11px; color:var(--faint); letter-spacing:.18em; }
  .pillar .pic{ width:44px; height:44px; border-radius:12px; display:grid; place-items:center; background:var(--surface-3); border:1px solid var(--line); color:var(--violet-br); margin:14px 0 16px; }
  .pillar h3{ font-size:19px; } .pillar p{ color:var(--muted); font-size:14.5px; margin:9px 0 0; }
  .pillar::after{ content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:linear-gradient(var(--violet),var(--phosphor)); opacity:0; transition:opacity .25s; }
  .pillar:hover::after{ opacity:1; }

  /* featured picks */
  .feat-grid{ display:grid; grid-template-columns:1fr 1fr; gap:18px; }
  .feat{ display:flex; gap:18px; align-items:center; background:linear-gradient(180deg,var(--surface-2),var(--surface)); border:1px solid var(--line); border-radius:var(--radius); padding:22px; transition:border-color .25s, transform .25s; cursor:pointer; }
  .feat:hover{ border-color:var(--violet); transform:translateY(-3px); }
  .feat .fmeta .top{ font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--violet-br); display:flex; align-items:center; gap:8px; }
  .feat .fmeta h3{ font-size:20px; margin:8px 0 6px; }
  .feat .fmeta .d{ color:var(--muted); font-size:14px; } .feat .fmeta .p{ margin-top:12px; display:flex; align-items:center; gap:12px; }

  /* method timeline */
  .method{ display:grid; grid-template-columns:repeat(4,1fr); gap:16px; counter-reset:m; }
  .step{ background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:24px 20px; position:relative; }
  .step .num{ font-family:var(--mono); font-size:13px; color:var(--phosphor); letter-spacing:.1em; }
  .step h3{ font-size:17px; margin:12px 0 8px; } .step p{ color:var(--muted); font-size:14px; margin:0; }
  .step::before{ content:""; position:absolute; right:-10px; top:38px; width:20px; height:1px; background:var(--line-strong); }
  .step:last-child::before{ display:none; }

  /* CTA card */
  .cta-card{ position:relative; overflow:hidden; border-radius:22px; border:1px solid var(--line-strong);
    background:radial-gradient(700px 300px at 15% 0%, rgba(124,58,237,.35), transparent 60%), var(--surface);
    padding:48px; text-align:center; box-shadow:var(--shadow); }
  .cta-card h2{ font-size:clamp(26px,3.4vw,38px); } .cta-card p{ color:var(--muted); max-width:50ch; margin:14px auto 0; }

  /* waitlist form */
  .wl{ display:flex; gap:10px; max-width:440px; margin:26px auto 0; flex-wrap:wrap; }
  .wl input{ flex:1 1 220px; min-width:0; height:50px; padding:0 16px; border-radius:12px; background:var(--bg-2);
    border:1px solid var(--line-strong); color:var(--text); font-size:15px; font-family:var(--sans); }
  .wl input::placeholder{ color:var(--faint); }
  .wl input:focus{ outline:none; border-color:var(--violet); }
  .wl-note{ font-family:var(--mono); font-size:11.5px; color:var(--faint); margin-top:14px; letter-spacing:.03em; }
  .wl-ok{ color:var(--phosphor); font-family:var(--mono); font-size:14px; margin-top:22px; display:flex; align-items:center; justify-content:center; gap:9px; }

  /* ============ reviews grid ============ */
  .page-head{ padding:52px 0 26px; }
  .page-head h1{ font-size:clamp(34px,5vw,58px); margin-top:14px; }
  .page-head p{ color:var(--muted); max-width:60ch; margin:16px 0 0; }
  .cat-grid{ display:grid; grid-template-columns:1fr 1fr; gap:18px; }
  .cat-card{ position:relative; overflow:hidden; background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
    padding:28px; cursor:pointer; transition:border-color .25s, transform .25s; display:flex; flex-direction:column; min-height:190px; }
  .cat-card.live:hover{ border-color:var(--violet); transform:translateY(-4px); }
  .cat-card.soon{ cursor:default; }
  .cat-card .cic{ width:52px; height:52px; border-radius:13px; display:grid; place-items:center; background:var(--surface-3); border:1px solid var(--line); color:var(--violet-br); margin-bottom:auto; }
  .cat-card h3{ font-size:22px; margin:20px 0 8px; } .cat-card .cd{ color:var(--muted); font-size:14px; }
  .cat-card .cfoot{ margin-top:16px; display:flex; align-items:center; gap:10px; }
  .cat-grid.more{ grid-template-columns:repeat(4,1fr); }
  .cat-grid.more .cat-card{ min-height:0; padding:22px; align-items:flex-start; }
  .cat-grid.more .cat-card .cic{ width:44px; height:44px; margin-bottom:14px; }
  .cat-grid.more .cat-card h3{ font-size:17px; margin:0 0 12px; }

  /* controls */
  .controls{ display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin:8px 0 26px; padding:14px; background:var(--surface); border:1px solid var(--line); border-radius:14px; }
  .search{ position:relative; flex:1 1 260px; }
  .search input{ width:100%; height:44px; padding:0 14px 0 42px; border-radius:10px; background:var(--bg-2); border:1px solid var(--line); color:var(--text); font-size:14.5px; font-family:var(--sans); }
  .search input:focus{ outline:none; border-color:var(--violet); }
  .search svg{ position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--faint); }
  .seg{ display:flex; gap:4px; background:var(--bg-2); border:1px solid var(--line); border-radius:10px; padding:4px; }
  .seg button{ border:none; background:transparent; color:var(--muted); font-family:var(--mono); font-size:12.5px; font-weight:600; letter-spacing:.03em; padding:8px 13px; border-radius:7px; cursor:pointer; transition:color .15s, background .15s; }
  .seg button.on{ background:var(--surface-3); color:var(--text); }
  .seg button:hover{ color:var(--text); }

  /* ranked list */
  .rank-list{ display:flex; flex-direction:column; gap:12px; }
  .contact{ display:grid; grid-template-columns:56px 52px 1fr auto; gap:20px; align-items:center;
    background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:18px 22px;
    position:relative; overflow:hidden; transition:border-color .22s, transform .22s, background .22s; }
  .contact:hover{ border-color:var(--violet); transform:translateX(3px); }
  .contact::before{ content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:linear-gradient(var(--violet),var(--phosphor)); opacity:0; transition:opacity .22s; }
  .contact:hover::before{ opacity:1; }
  .rk{ font-family:var(--mono); font-weight:700; font-size:34px; letter-spacing:-.04em; color:var(--faint); text-align:center; }
  .contact:nth-child(1) .rk, .rk.top{ color:var(--violet-br); }
  .c-body{ min-width:0; cursor:pointer; }
  .c-body .cname{ font-size:18px; font-weight:700; letter-spacing:-.01em; }
  .c-body .ctags{ display:flex; gap:7px; margin:7px 0 8px; flex-wrap:wrap; }
  .c-body .cdesc{ color:var(--muted); font-size:14px; margin:0; }

    </div></section>
    <section class="band" style="padding-top:8px"><div class="wrap">
      <div class="sec-head rv"><div><span class="eyebrow">Our approach</span><h2>Where reviewers agree, we listen.</h2></div></div>
      <div class="prose rv"><p>No two reviewers see a product the same way. A mouse one person calls "too small" is another's perfect fit. Instead of betting everything on a single take, we look for the <b>points of agreement</b> across many expert and everyday sources.</p>
      <p>That agreement is what shapes our recommendations — so you get a clearer, more balanced picture before you buy, and a ranking you can actually trust.</p></div>
    </div></section>
    <section class="band"><div class="wrap"><div class="cta-card rv">
      <h2>Ready to buy smarter?</h2>
      <p>See the gear that made the cut, backed by real, cross-referenced data.</p>
      <div style="margin-top:24px"><button class="btn btn-primary" data-nav="/reviews">Browse reviews</button></div>
    </div></div></section>`;
  }

  /* shared bits */
  function sectionHead(eyebrow, title, sub){
    return `<section class="page-head"><div class="wrap"><div class="rv"><span class="eyebrow">${esc(eyebrow)}</span>
      <h1>${esc(title)}</h1>${sub?`<p>${esc(sub)}</p>`:''}</div></div></section>`;
  }
  const categoryTitle = c => ({mice:"Gaming Mice",keyboards:"Gaming Keyboards"}[c.slug] || ("Gaming "+c.name));
  function comingSoonCategory(c){
    return `${sectionHead("Gear Reviews · "+c.name, c.name+" — coming soon", "This category isn't live yet. We're cross-referencing sources now — leave your email and we'll tell you the moment the "+c.name.toLowerCase()+" ranking drops.")}
      <section class="band" style="padding-top:0"><div class="wrap"><div class="cta-card rv">
        <div class="cic" style="width:60px;height:60px;margin:0 auto 8px;border-radius:15px;display:grid;place-items:center;background:var(--surface-3);border:1px solid var(--line);color:var(--violet-br)">${c.icon}</div>
        <h2 style="margin-top:14px">${esc(c.name)} ranking in progress</h2>
        <p>${esc(c.blurb)}</p>
        <form class="wl" data-waitlist="cat-${c.slug}"><input type="email" placeholder="you@example.com" aria-label="Email" required><button class="btn btn-primary" type="submit">Notify me</button></form>
        <div class="wl-note">Front-end demo · stored locally in your browser only.</div>
      </div>
      <div style="text-align:center;margin-top:26px"><a class="link-arrow" href="#/reviews" data-route="/reviews">← Back to all categories</a></div>
      </div></section>`;
  }
  function notFound(){
    return `<section class="band"><div class="wrap"><div class="empty">
      <h3 style="font-size:24px;color:var(--text)">Off the radar</h3>
      <p style="margin:10px 0 22px">We couldn't find that page.</p>
      <button class="btn btn-primary" data-nav="/">Back to home</button></div></div></section>`;
  }

  /* ============================ ROUTER ============================ */
  function parse(){
    let h = location.hash.replace(/^#/,"") || "/";
    const parts = h.split("/").filter(Boolean);
    if(parts.length===0) return {route:"/", view:viewHome};
    if(parts[0]==="reviews") return {route:"/reviews", view:viewReviews};
    if(parts[0]==="guides") return {route:"/guides", view:viewGuides};
    if(parts[0]==="about") return {route:"/about", view:viewAbout};
    if(parts[0]==="compare") return {route:"/compare", view:viewCompare};
    if(parts[0]==="c" && parts[1]) return {route:"/reviews", view:()=>viewCategory(parts[1])};
    if(parts[0]==="p" && parts[1] && parts[2]) return {route:"/reviews", view:()=>viewProduct(parts[1],parts[2])};
    return {route:h, view:notFound};
  }

  let radarRAF = null;
  function render(){
    if(radarRAF){ cancelAnimationFrame(radarRAF); radarRAF=null; }
    const {route, view} = parse();
    const app = document.getElementById("app");
    app.innerHTML = header(route) + `<main>${view()}</main>` + footer();
    window.scrollTo(0,0);
    wireHeader();
    afterRender(route);
  }

  /* ============================ POST-RENDER WIRING ============================ */
  function afterRender(route){
    setThemeBtn();
    // reveal
    const io = new IntersectionObserver((ents)=>{ ents.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add("in"); io.unobserve(e.target); } }); }, {threshold:.12, rootMargin:"0px 0px -40px 0px"});
    document.querySelectorAll(".rv:not(.in)").forEach(el=>io.observe(el));
    // gauges + bars animate
    requestAnimationFrame(()=>{ setTimeout(()=>{
      document.querySelectorAll(".gauge[data-v]").forEach(g=>g.style.setProperty("--v", g.getAttribute("data-v")));
      document.querySelectorAll(".bf[data-w]").forEach(b=>b.style.width = b.getAttribute("data-w")+"%");
    }, 60); });
    // category list
    if(document.getElementById("rankList")) wireCategory();
    // radar
    if(document.getElementById("radar")) initRadar();
    // waitlist
    document.querySelectorAll("form[data-waitlist]").forEach(wireWaitlist);
    // compare toggles / removes
    document.querySelectorAll(".cmp-toggle").forEach(b=>b.addEventListener("click", onCompareToggle));
    document.querySelectorAll(".cmp-remove").forEach(b=>b.addEventListener("click", (e)=>{ e.stopPropagation(); toggleCompare(b.dataset.cat,b.dataset.slug); render(); }));
    // nav clicks (buttons / cards with data-nav)
    document.querySelectorAll("[data-nav]").forEach(el=>{
      if(el.tagName==="A") return;
      el.addEventListener("click",(e)=>{ if(e.target.closest(".cmp-toggle")) return; location.hash = el.getAttribute("data-nav"); });
    });
  }

  function wireHeader(){
    document.querySelectorAll("[data-route]").forEach(a=>{}); // anchors use hash natively
    const hamb = document.getElementById("hambBtn"), links = document.getElementById("navlinks");
    if(hamb) hamb.addEventListener("click", ()=>links.classList.toggle("open"));
    if(links) links.querySelectorAll("a").forEach(a=>a.addEventListener("click",()=>links.classList.remove("open")));
    const t = document.getElementById("themeBtn");
    if(t) t.addEventListener("click", toggleTheme);
    document.querySelector(".cmp-btn").addEventListener("click", ()=>location.hash="/compare");
  }

  function onCompareToggle(e){
    e.preventDefault(); e.stopPropagation();
    const btn=e.currentTarget; const ok=toggleCompare(btn.dataset.cat, btn.dataset.slug);
    if(!ok){ btn.animate([{transform:"translateX(0)"},{transform:"translateX(-4px)"},{transform:"translateX(4px)"},{transform:"translateX(0)"}],{duration:220}); return; }
    render();
  }

  /* ---------- category interactions ---------- */
  function wireCategory(){
    const slug = parse(); const cs = location.hash.split("/")[2];
    const c = catBySlug(cs); if(!c) return;
    const listEl = document.getElementById("rankList");
    let q="", sort="rank";
    const draw = ()=>{
      let arr = c.products.slice();
      if(q){ const t=q.toLowerCase(); arr=arr.filter(p=>(p.name+" "+p.tags.join(" ")+" "+p.desc).toLowerCase().includes(t)); }
      if(sort==="rank") arr.sort((a,b)=>a.rank-b.rank);
      if(sort==="score") arr.sort((a,b)=>b.score-a.score);
      if(sort==="plow") arr.sort((a,b)=>a.priceNum-b.priceNum);
      if(sort==="phigh") arr.sort((a,b)=>b.priceNum-a.priceNum);
      listEl.innerHTML = arr.length ? arr.map(p=>contactHTML(c,p)).join("") : `<div class="empty"><p>No matches for "<b style="color:var(--text)">${esc(q)}</b>".</p></div>`;
      // rewire the freshly drawn rows
      listEl.querySelectorAll(".rv").forEach(el=>el.classList.add("in"));
      listEl.querySelectorAll(".gauge[data-v]").forEach(g=>g.style.setProperty("--v", g.getAttribute("data-v")));
      listEl.querySelectorAll("[data-nav]").forEach(el=>{ if(el.tagName!=="A") el.addEventListener("click",()=>location.hash=el.getAttribute("data-nav")); });
      listEl.querySelectorAll(".c-body").forEach(el=>el.addEventListener("click",()=>location.hash=el.getAttribute("data-nav")));
      listEl.querySelectorAll(".cmp-toggle").forEach(b=>b.addEventListener("click", onCompareToggle));
    };
    const s=document.getElementById("catSearch");
    if(s) s.addEventListener("input",e=>{ q=e.target.value; draw(); });
    document.querySelectorAll("#catSort button").forEach(b=>b.addEventListener("click",()=>{
      document.querySelectorAll("#catSort button").forEach(x=>x.classList.remove("on")); b.classList.add("on"); sort=b.dataset.sort; draw();
    }));
    draw();
  }

  /* ---------- waitlist ---------- */
  function wireWaitlist(form){
    form.addEventListener("submit",(e)=>{
      e.preventDefault();
      const input=form.querySelector("input"); const val=(input.value||"").trim();
      if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(val)){ input.style.borderColor="var(--amber)"; input.focus(); return; }
      try{ const arr=JSON.parse(localStorage.getItem("rr_waitlist")||"[]"); arr.push({email:val,at:Date.now(),src:form.dataset.waitlist}); localStorage.setItem("rr_waitlist",JSON.stringify(arr)); }catch(err){}
      form.outerHTML = `<div class="wl-ok"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> You're on the list — we'll be in touch.</div>`;
    });
  }

  /* ---------- theme ---------- */
  function currentTheme(){
    const set = store.theme;
    if(set) return set;
    return (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) ? "light" : "dark";
  }
  function setThemeBtn(){
    const t=document.getElementById("themeBtn"); if(!t) return;
    const dark = currentTheme()!=="light";
    t.innerHTML = dark
      ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.5"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line x1="4.9" y1="4.9" x2="7" y2="7"/><line x1="17" y1="17" x2="19.1" y2="19.1"/><line x1="4.9" y1="19.1" x2="7" y2="17"/><line x1="17" y1="7" x2="19.1" y2="4.9"/></svg>`
      : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>`;
  }
  function applyTheme(){ document.documentElement.setAttribute("data-theme", currentTheme()); }
  function toggleTheme(){ store.theme = currentTheme()==="light" ? "dark" : "light"; applyTheme(); setThemeBtn();
    if(document.getElementById("radar")) initRadar(); }

  /* ---------- radar canvas ---------- */
  function cssVar(n){ return getComputedStyle(document.documentElement).getPropertyValue(n).trim(); }
  function initRadar(){
    const canvas=document.getElementById("radar"); if(!canvas) return;
    const ctx=canvas.getContext("2d");
    const dpr=Math.min(2, window.devicePixelRatio||1);
    function size(){ const r=canvas.getBoundingClientRect(); canvas.width=r.width*dpr; canvas.height=r.height*dpr; }
    size();
    const reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const phos = cssVar("--phosphor") || "#35f0a5";
    const viol = cssVar("--violet") || "#a855f7";
    const blips = [
      {a:35, r:.58, live:true, label:"MICE"},
      {a:128, r:.70, live:true, label:"KEYBOARDS"},
      {a:205, r:.5, live:false, label:"HEADSETS"},
      {a:288, r:.74, live:false, label:"MONITORS"},
      {a:158, r:.86, live:false, label:"CHAIRS"},
      {a:322, r:.4, live:false, label:"PADS"}
    ].map(b=>({...b, glow:0}));
    let sweep=0;
    function toRad(d){ return d*Math.PI/180; }
    function frame(){
      const W=canvas.width, H=canvas.height, cx=W/2, cy=H/2, R=Math.min(W,H)*0.46;
      ctx.clearRect(0,0,W,H);
      // rings
      ctx.lineWidth=1*dpr;
      for(let i=1;i<=4;i++){ ctx.beginPath(); ctx.strokeStyle="rgba(168,120,247,"+(0.10+i*0.02)+")"; ctx.arc(cx,cy,R*i/4,0,Math.PI*2); ctx.stroke(); }
      // cross
      ctx.strokeStyle="rgba(168,120,247,0.12)";
      ctx.beginPath(); ctx.moveTo(cx-R,cy); ctx.lineTo(cx+R,cy); ctx.moveTo(cx,cy-R); ctx.lineTo(cx,cy+R); ctx.stroke();
      // diagonal ticks
      ctx.beginPath(); const d=R*0.707; ctx.moveTo(cx-d,cy-d); ctx.lineTo(cx+d,cy+d); ctx.moveTo(cx-d,cy+d); ctx.lineTo(cx+d,cy-d);
      ctx.strokeStyle="rgba(168,120,247,0.06)"; ctx.stroke();
      // sweep wedge
      const grad=ctx.createRadialGradient(cx,cy,0,cx,cy,R);
      grad.addColorStop(0,"rgba(53,240,165,0.28)"); grad.addColorStop(1,"rgba(53,240,165,0)");
      ctx.save(); ctx.translate(cx,cy); ctx.rotate(toRad(sweep));
      ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,R,toRad(-24),0); ctx.closePath(); ctx.fillStyle=grad; ctx.fill();
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(R,0); ctx.strokeStyle="rgba(53,240,165,0.55)"; ctx.lineWidth=1.5*dpr; ctx.stroke();
      ctx.restore();
      // blips
      ctx.textAlign="center"; ctx.font=(10*dpr)+"px ui-monospace, monospace";
      blips.forEach(b=>{
        const x=cx+Math.cos(toRad(b.a))*R*b.r, y=cy+Math.sin(toRad(b.a))*R*b.r;
        // pass detection
        let diff=Math.abs(((sweep%360)-b.a+540)%360-180);
        if(diff<7) b.glow=1;
        b.glow*=0.975;
        const base=b.live?0.55:0.28;
        const col=b.live?phos:viol;
        const alpha=Math.min(1, base + b.glow*0.6);
        ctx.beginPath(); ctx.fillStyle=hexA(col, alpha);
        ctx.arc(x,y,(b.live?3.4:2.6)*dpr + b.glow*3*dpr,0,Math.PI*2); ctx.fill();
        if(b.glow>0.05){ ctx.beginPath(); ctx.strokeStyle=hexA(col, b.glow*0.5); ctx.lineWidth=1*dpr; ctx.arc(x,y,(6+b.glow*10)*dpr,0,Math.PI*2); ctx.stroke(); }
        ctx.fillStyle=hexA(b.live?phos:viol, Math.min(0.9, 0.35+b.glow*0.6));
        ctx.fillText(b.label, x, y-10*dpr);
      });
      // center
      ctx.beginPath(); ctx.fillStyle=phos; ctx.arc(cx,cy,2.5*dpr,0,Math.PI*2); ctx.fill();
      if(!reduce){ sweep=(sweep+0.9)%360; radarRAF=requestAnimationFrame(frame); }
    }
    if(reduce){ sweep=35; frame(); } else { radarRAF=requestAnimationFrame(frame); }
    // handle resize once
    let rt; window.addEventListener("resize", ()=>{ clearTimeout(rt); rt=setTimeout(()=>{ if(document.getElementById("radar")===canvas){ size(); } },200); }, {once:false});
  }
  function hexA(hex, a){
    hex=hex.trim();
    if(hex.startsWith("rgb")) return hex.replace(/rgba?\(([^)]+)\)/, (m,inner)=>{ const p=inner.split(",").slice(0,3).map(s=>s.trim()); return "rgba("+p.join(",")+","+a+")"; });
    let h=hex.replace("#",""); if(h.length===3) h=h.split("").map(c=>c+c).join("");
    const r=parseInt(h.slice(0,2),16), g=parseInt(h.slice(2,4),16), b=parseInt(h.slice(4,6),16);
    return `rgba(${r},${g},${b},${a})`;
  }

  /* ============================ BOOT ============================ */
  applyTheme();
  window.addEventListener("hashchange", render);
  render();
})();
</script>

  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
